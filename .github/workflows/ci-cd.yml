name: User Identity Service CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Prepare Environment
      - name: Checkout Code
        uses: actions/checkout@v3 

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 2. Build the Microservice (Individual Task)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 3. DevSecOps Implementation (Bypassing Docker Errors)
      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk Monitor (Security Requirement)
        run: snyk monitor --severity-threshold=high
        env:
           SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 4. Containerization (LO3, LO4 Requirements)
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/user-identity-service:latest
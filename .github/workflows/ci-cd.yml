name: Java CI/CD with Maven and Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    # DevSecOps Step: Using CLI to avoid JAVA_HOME container errors
    - name: Install Snyk CLI
      uses: snyk/actions/setup@master

    - name: Run Snyk Security Scan
      run: snyk test --severity-threshold=high
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # Docker Steps: Containerize and Host the image
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # Replace 'your-docker-hub-username' with your actual username if not using secrets for the tag
        tags: ${{ secrets.DOCKER_USERNAME }}/user-identity-service:latest
    
    # DevSecOps Step: Using the Snyk Monitor to bypass local CLI execution errors
    - name: Snyk Security Scan
      uses: snyk/actions/maven@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        command: monitor
        args: --severity-threshold=high
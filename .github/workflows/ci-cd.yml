name: Java CI/CD with Maven and Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout Repository
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Setup JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3️⃣ Verify Maven Installation
    - name: Verify Maven
      run: |
        which mvn
        mvn -version

    # 4️⃣ Build Application
    - name: Build with Maven
      run: mvn clean package -DskipTests

    # 5️⃣ Clear Maven Cache (prevents corrupted dependency tree issues)
    - name: Clear Maven Cache
      run: rm -rf ~/.m2/repository

    # 6️⃣ Install Snyk CLI (VM mode, no Docker container)
    - name: Install Snyk CLI
      uses: snyk/actions/setup@v2

    # 7️⃣ Run Snyk Monitor (Debug enabled for stability)
    - name: Run Snyk Monitor
      run: |
        export MAVEN_OPTS="-Xmx1024m"
        snyk monitor --all-projects --severity-threshold=high -d
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # 8️⃣ Fail Build on High Vulnerabilities
    - name: Run Snyk Test
      run: snyk test --all-projects --severity-threshold=high
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # 9️⃣ Login to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔟 Build & Push Docker Image
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/user-identity-service:latest
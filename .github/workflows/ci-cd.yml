name: User Identity Service CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Updated to v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # This ensures your new application.yaml and pom.xml changes are compiled
        run: mvn clean package -DskipTests 

      - name: Log in to Docker Hub
        uses: docker/login-action@v3 # Updated to v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5 # Updated to v5
        with:
          context: .
          push: true
          # Added short SHA tagging for professional versioning
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/user-identity-service:latest
            ${{ secrets.DOCKER_USERNAME }}/user-identity-service:${{ github.sha }}
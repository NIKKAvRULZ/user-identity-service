name: Java CI/CD with Maven and Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout Source Code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Setup JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3️⃣ Build Application
    - name: Build with Maven
      run: mvn clean package -DskipTests

    # 4️⃣ Install Snyk CLI (runs on VM, not Docker)
    - name: Install Snyk CLI
      uses: snyk/actions/setup@v3

    # 5️⃣ Run Snyk Dependency Monitoring
    - name: Run Snyk Monitor
      run: snyk monitor --severity-threshold=high
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # 6️⃣ (Optional but Recommended) Fail Build on High Vulnerabilities
    - name: Run Snyk Test (Fail on High)
      run: snyk test --severity-threshold=high
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # 7️⃣ Login to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 8️⃣ Build and Push Docker Image
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/user-identity-service:latest
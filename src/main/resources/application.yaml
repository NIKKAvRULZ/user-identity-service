server:
  port: ${PORT:8085}
  forward-headers-strategy: framework

spring:
  application:
    name: user-identity-service
  
  # Explicitly tell Spring to use MongoDB and ignore JPA to fix the repository warning
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb+srv://nithika151_db_user:nithika123@cluster0.kd7jqcp.mongodb.net/user_db?retryWrites=true&w=majority}
      database: user_db
  autoconfigure:
    exclude: 
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# OpenAPI & Swagger UI Configuration (Requirement: API Contract)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  writer-with-default-pretty-printer: true

# Inter-Service Communication Endpoints (Requirement: Inter-service communication)
services:
  catalog-node: ${CATALOG_SERVICE_URL:https://menu-service-production-048a.up.railway.app}
  order-node: ${ORDER_SERVICE_URL:https://order-service-production-5615.up.railway.app}
  notification-node: ${NOTIFICATION_SERVICE_URL:https://notification-service-production-e192.up.railway.app/}